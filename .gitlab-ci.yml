
stages:          # List of stages for jobs, and their order of execution
  - build
  - test

build-job:
  stage: build
  script:
    - nix --accept-flake-config --extra-experimental-features "nix-command flakes" develop --print-build-logs --verbose --command bash -c "echo OK"

c-lib-test-job:
  stage: test
  script:
    - nix --accept-flake-config --extra-experimental-features "nix-command flakes" develop --print-build-logs --verbose --command bash -c "cd src/stacktrek && clang -g -O1 -I . test.c -o test -lm -lgc && ./test"

unit-test-job:
  stage: test
  script:
    - echo TODO

benchmarks-test-job:
  stage: test
  script:
    - nix --accept-flake-config --extra-experimental-features "nix-command flakes" develop --print-build-logs --verbose --command bash -c "dune runtest ./test/benchmarks"

compile-test-job:
  stage: test
  script:
    - nix --accept-flake-config --extra-experimental-features "nix-command flakes" develop --print-build-logs --verbose --command bash -c "dune runtest ./test/compile"

integration-test-job:
  stage: test
  script:
    - nix --accept-flake-config --extra-experimental-features "nix-command flakes" develop --print-build-logs --verbose --command bash -c "dune runtest ./test/integration"

nightly-bench-job-intel:
  stage: test
  tags:
    - intel
  rules:
    - if: $BENCH
  script:
    - |
      nix --accept-flake-config --extra-experimental-features "nix-command flakes" develop --print-build-logs --verbose --command bash -c \
      "opam init; \
      opam switch create 5.3.0+trunk; \
      opam install -y multicont; \
      cd scripts && \
      bench.py --quick --all-benchmarks --systems lexa effekt koka_named koka ocaml && \
      bench.py --quick --all-vanilla-benchmarks --systems lexaz"

nightly-bench-job-amd:
  stage: test
  tags:
    - amd
  rules:
    - if: $BENCH
  script:
    - |
      nix --accept-flake-config --extra-experimental-features "nix-command flakes" develop --print-build-logs --verbose --command bash -c \
      "opam init; \
      opam switch create 5.3.0+trunk; \
      opam install -y multicont; \
      cd scripts && \
      bench.py --quick --all-benchmarks --systems lexa effekt koka_named koka ocaml && \
      bench.py --quick --all-vanilla-benchmarks --systems lexaz"